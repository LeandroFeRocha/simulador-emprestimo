<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Empréstimo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      const { Calculator, Calendar, DollarSign, Send, UserCheck, Clock } = lucide;

      function App() {
        const [amount, setAmount] = useState(1000);
        const [months, setMonths] = useState(6);
        const [cpf, setCpf] = useState('');
        const [firstPaymentDate, setFirstPaymentDate] = useState('');
        const [installment, setInstallment] = useState(0);
        const [totalPayment, setTotalPayment] = useState(0);
        
        const interestRate = 0.10; // 10% ao mês
        
        // ALTERE O NÚMERO ABAIXO QUANDO TIVER O NOVO CHIP (Apenas números com DDD)
        const yourWhatsAppNumber = "5511999999999"; 

        useEffect(() => {
          const today = new Date();
          today.setDate(today.getDate() + 30);
          const formattedDate = today.toISOString().split('T')[0];
          setFirstPaymentDate(formattedDate);
        }, []);

        const handleCpfChange = (e) => {
          let value = e.target.value.replace(/\D/g, '');
          if (value.length <= 11) {
            value = value.replace(/^(\d{3})(\d)/, "$1.$2");
            value = value.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
            value = value.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");
            setCpf(value);
          }
        };

        useEffect(() => {
          if (amount > 0 && months > 0) {
            const pmt = amount * (interestRate * Math.pow(1 + interestRate, months)) / (Math.pow(1 + interestRate, months) - 1);
            setInstallment(pmt);
            setTotalPayment(pmt * months);
          } else {
            setInstallment(0);
            setTotalPayment(0);
          }
        }, [amount, months]);

        const formatCurrency = (value) => {
          return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        const formatDateDisplay = (dateStr) => {
          if (!dateStr) return "";
          const [year, month, day] = dateStr.split('-');
          return `${day}/${month}/${year}`;
        };

        const handleSendWhatsApp = () => {
          if (cpf.length < 14) {
            alert("Por favor, preencha o CPF corretamente.");
            return;
          }

          const text = `*SOLICITAÇÃO DE EMPRÉSTIMO*%0A%0A` +
                       `👤 *Identificação (CPF):* ${cpf}%0A` +
                       `💰 *Valor Solicitado:* ${formatCurrency(amount)}%0A` +
                       `🗓 *Prazo:* ${months} meses%0A` +
                       `💵 *Valor da Parcela:* ${formatCurrency(installment)}%0A` +
                       `📊 *Total a Pagar:* ${formatCurrency(totalPayment)}%0A` +
                       `📅 *1º Vencimento:* ${formatDateDisplay(firstPaymentDate)}%0A%0A` +
                       `O cliente aguarda análise do cadastro.`;
                       
          window.open(`https://wa.me/${yourWhatsAppNumber}?text=${text}`, '_blank');
        };

        const isFormValid = cpf.length === 14 && amount > 0 && firstPaymentDate !== '';

        return (
          <div className="min-h-screen flex items-center justify-center p-4">
            <div className="bg-white max-w-md w-full rounded-3xl shadow-2xl overflow-hidden border border-white">
              
              <div className="bg-gradient-to-br from-blue-600 to-indigo-800 p-8 text-white text-center">
                <div className="flex justify-center mb-4">
                  <div className="bg-white/10 p-4 rounded-2xl backdrop-blur-sm">
                    <i data-lucide="calculator" style={{width: '36px', height: '36px'}}></i>
                  </div>
                </div>
                <h1 className="text-2xl font-extrabold tracking-tight">Simulador de Crédito</h1>
                <p className="text-blue-100 text-sm opacity-90 mt-1 font-medium">Transparência total na sua simulação</p>
              </div>

              <div className="p-8 space-y-6">
                <div className="space-y-2">
                  <label className="flex items-center text-[11px] font-black text-slate-500 uppercase tracking-[2px]">
                    <i data-lucide="user-check" class="mr-2 text-blue-600" style={{width: '14px', height: '14px'}}></i>
                    Seu CPF
                  </label>
                  <input
                    type="text"
                    placeholder="000.000.000-00"
                    value={cpf}
                    onChange={handleCpfChange}
                    className="w-full px-5 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg font-mono"
                  />
                </div>

                <div className="space-y-2">
                  <label className="flex items-center text-[11px] font-black text-slate-500 uppercase tracking-[2px]">
                    <i data-lucide="dollar-sign" class="mr-2 text-blue-600" style={{width: '14px', height: '14px'}}></i>
                    Valor do Empréstimo
                  </label>
                  <div className="relative">
                    <span className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">R$</span>
                    <input
                      type="number"
                      value={amount}
                      onChange={(e) => setAmount(Number(e.target.value))}
                      className="w-full pl-12 pr-5 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-xl font-bold"
                    />
                  </div>
                </div>

                <div className="space-y-3">
                  <div className="flex justify-between items-center">
                    <label className="flex items-center text-[11px] font-black text-slate-500 uppercase tracking-[2px]">
                      <i data-lucide="calendar" class="mr-2 text-blue-600" style={{width: '14px', height: '14px'}}></i>
                      Prazo (Meses)
                    </label>
                    <span className="text-blue-700 font-black bg-blue-50 px-3 py-1 rounded-lg text-xs">
                      {months} meses
                    </span>
                  </div>
                  <input
                    type="range"
                    min="1"
                    max="24"
                    value={months}
                    onChange={(e) => setMonths(Number(e.target.value))}
                    className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  />
                </div>

                <div className="space-y-2">
                  <label className="flex items-center text-[11px] font-black text-slate-500 uppercase tracking-[2px]">
                    <i data-lucide="clock" class="mr-2 text-blue-600" style={{width: '14px', height: '14px'}}></i>
                    1º Vencimento
                  </label>
                  <input
                    type="date"
                    value={firstPaymentDate}
                    onChange={(e) => setFirstPaymentDate(e.target.value)}
                    className="w-full px-5 py-3.5 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-bold text-slate-700"
                  />
                </div>

                <div className="bg-slate-900 rounded-3xl p-6 text-white shadow-xl">
                  <h3 className="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-1">Parcela Mensal</h3>
                  <div className="text-4xl font-black mb-4">
                    {formatCurrency(installment)}
                  </div>
                  
                  <div className="space-y-2 pt-4 border-t border-white/10 text-xs">
                    <div className="flex justify-between text-slate-400">
                      <span>Taxa aplicada:</span>
                      <span className="text-white font-bold">10% a.m.</span>
                    </div>
                    <div className="flex justify-between text-slate-400">
                      <span>Total final:</span>
                      <span className="text-white font-bold">{formatCurrency(totalPayment)}</span>
                    </div>
                  </div>
                </div>

                <button
                  onClick={handleSendWhatsApp}
                  disabled={!isFormValid}
                  className={`w-full flex items-center justify-center space-x-3 py-4 rounded-2xl font-black text-base transition-all shadow-lg ${
                    isFormValid 
                    ? 'bg-green-500 hover:bg-green-600 text-white' 
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                  }`}
                >
                  <span>SOLICITAR EMPRÉSTIMO</span>
                  <i data-lucide="send" style={{width: '18px', height: '18px'}}></i>
                </button>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
      
      // Inicializa os ícones após o render
      setTimeout(() => lucide.createIcons(), 100);
    </script>
  </body>
