<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Empréstimo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
      input[type="date"] { min-height: 3rem; }
    </style>
  </head>
  <body class="bg-slate-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      
      const WhatsAppIcon = ({ className }) => (
        <svg viewBox="0 0 24 24" className={className} fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      );
      
      function App() {
        const [name, setName] = useState('');
        const [amount, setAmount] = useState(1000);
        const [months, setMonths] = useState(6);
        const [cpf, setCpf] = useState('');
        const [firstPaymentDate, setFirstPaymentDate] = useState('');
        const [installment, setInstallment] = useState(0);
        const [totalPayment, setTotalPayment] = useState(0);
        
        const interestRate = 0.10; 
        const yourWhatsAppNumber = "5511999999999"; 

        useEffect(() => {
          const today = new Date();
          today.setDate(today.getDate() + 30);
          setFirstPaymentDate(today.toISOString().split('T')[0]);
        }, []);

        useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

        const handleCpfChange = (e) => {
          let value = e.target.value.replace(/\D/g, '');
          if (value.length <= 11) {
            value = value.replace(/^(\d{3})(\d)/, "$1.$2");
            value = value.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
            value = value.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");
            setCpf(value);
          }
        };

        useEffect(() => {
          if (amount > 0 && months > 0) {
            const pmt = amount * (interestRate * Math.pow(1 + interestRate, months)) / (Math.pow(1 + interestRate, months) - 1);
            setInstallment(pmt);
            setTotalPayment(pmt * months);
          }
        }, [amount, months]);

        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        const formatDateDisplay = (dateStr) => {
          if (!dateStr) return "";
          const [year, month, day] = dateStr.split('-');
          return `${day}/${month}/${year}`;
        };

        const handleSendWhatsApp = () => {
          const text = `*SOLICITAÇÃO DE EMPRÉSTIMO*%0A%0A👤 *Nome:* ${name}%0A🆔 *CPF:* ${cpf}%0A💰 *Valor:* ${formatCurrency(amount)}%0A🗓 *Prazo:* ${months}x%0A💵 *Parcela:* ${formatCurrency(installment)}%0A📊 *Total:* ${formatCurrency(totalPayment)}%0A📅 *1º Vencimento:* ${formatDateDisplay(firstPaymentDate)}`;
          window.open(`https://wa.me/${yourWhatsAppNumber}?text=${text}`, '_blank');
        };

        const isFormValid = name.length >= 3 && cpf.length === 14 && amount > 0;

        return (
          <div className="min-h-screen flex items-center justify-center p-2 bg-slate-100">
            <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
              <div className="bg-gradient-to-br from-blue-600 to-indigo-900 p-8 text-white text-center">
                <i data-lucide="calculator" className="w-12 h-12 mx-auto mb-4"></i>
                <h1 className="text-3xl font-black mb-1">Simulador</h1>
                <p className="text-blue-100 text-sm font-medium uppercase tracking-widest">Crédito Rápido</p>
              </div>

              <div className="p-6 space-y-5">
                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nome Completo</label>
                  <input type="text" value={name} onChange={e => setName(e.target.value)} className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold" placeholder="Digite seu nome" />
                </div>

                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">CPF</label>
                  <input type="text" value={cpf} onChange={handleCpfChange} className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-mono font-bold" placeholder="000.000.000-00" />
                </div>

                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Valor</label>
                  <div className="relative">
                    <span className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">R$</span>
                    <input type="number" value={amount} onChange={e => setAmount(Number(e.target.value))} className="w-full pl-12 pr-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-black text-xl" />
                  </div>
                </div>

                <div className="space-y-2">
                  <div className="flex justify-between items-center px-1">
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Parcelas</label>
                    <span className="text-blue-700 font-black text-sm">{months}x</span>
                  </div>
                  <input type="range" min="1" max="24" value={months} onChange={e => setMonths(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-full appearance-none cursor-pointer accent-blue-600" />
                </div>

                <div>
                  <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">1º Vencimento</label>
                  <input type="date" value={firstPaymentDate} onChange={e => setFirstPaymentDate(e.target.value)} className="w-full px-5 py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-blue-500 outline-none font-bold" />
                </div>

                <div className="bg-slate-900 rounded-3xl p-6 text-white shadow-xl">
                  <h3 className="text-blue-400 text-[10px] font-black uppercase mb-1">Sua Parcela</h3>
                  <div className="text-4xl font-black mb-4">{formatCurrency(installment)}</div>
                  <div className="pt-4 border-t border-white/10 flex justify-between text-[11px] font-bold text-slate-400">
                    <span>TOTAL:</span>
                    <span className="text-white">{formatCurrency(totalPayment)}</span>
                  </div>
                </div>

                <button 
                  onClick={handleSendWhatsApp} 
                  disabled={!isFormValid}
                  className={`w-full flex items-center justify-center space-x-3 py-5 rounded-2xl font-black text-lg transition-all active:scale-95 ${isFormValid ? 'bg-green-500 text-white' : 'bg-slate-200 text-slate-400'}`}
                >
                  <span className="uppercase tracking-widest text-sm">Enviar Proposta</span>
                  <WhatsAppIcon className="w-6 h-6" />
                </button>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
