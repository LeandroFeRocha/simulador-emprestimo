<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulador de Empréstimo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
      body { 
        font-family: 'Inter', sans-serif; 
        -webkit-tap-highlight-color: transparent;
      }
      /* Previne flashes de conteúdo não estilizado */
      [id="root"]:empty { display: none; }
      
      /* Ajuste fino para inputs no mobile */
      input, select, textarea {
        font-size: 16px !important; /* Evita zoom automático no iOS */
      }
    </style>
  </head>
  <body class="bg-slate-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;
      
      // Componente de Ícone do WhatsApp personalizado (SVG)
      const WhatsAppIcon = ({ className }) => (
        <svg 
          viewBox="0 0 24 24" 
          className={className}
          fill="currentColor" 
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      );
      
      function App() {
        const [name, setName] = useState('');
        const [amount, setAmount] = useState(1000);
        const [months, setMonths] = useState(6);
        const [cpf, setCpf] = useState('');
        const [firstPaymentDate, setFirstPaymentDate] = useState('');
        const [installment, setInstallment] = useState(0);
        const [totalPayment, setTotalPayment] = useState(0);
        
        const interestRate = 0.10; // 10% ao mês
        
        // ALTERE O NÚMERO ABAIXO QUANDO TIVER O NOVO CHIP (Apenas números com DDD)
        const yourWhatsAppNumber = "5511999999999"; 

        useEffect(() => {
          const today = new Date();
          today.setDate(today.getDate() + 30);
          const formattedDate = today.toISOString().split('T')[0];
          setFirstPaymentDate(formattedDate);
          
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, []);

        useEffect(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        });

        const handleCpfChange = (e) => {
          let value = e.target.value.replace(/\D/g, '');
          if (value.length <= 11) {
            value = value.replace(/^(\d{3})(\d)/, "$1.$2");
            value = value.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
            value = value.replace(/^(\d{3})\.(\d{3})\.(\d{3})(\d)/, "$1.$2.$3-$4");
            setCpf(value);
          }
        };

        useEffect(() => {
          if (amount > 0 && months > 0) {
            const pmt = amount * (interestRate * Math.pow(1 + interestRate, months)) / (Math.pow(1 + interestRate, months) - 1);
            setInstallment(pmt);
            setTotalPayment(pmt * months);
          } else {
            setInstallment(0);
            setTotalPayment(0);
          }
        }, [amount, months]);

        const formatCurrency = (value) => {
          return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        const formatDateDisplay = (dateStr) => {
          if (!dateStr) return "";
          const [year, month, day] = dateStr.split('-');
          return `${day}/${month}/${year}`;
        };

        const handleSendWhatsApp = () => {
          if (name.length < 3) {
            alert("Por favor, preencha seu nome completo.");
            return;
          }
          if (cpf.length < 14) {
            alert("Por favor, preencha o CPF corretamente.");
            return;
          }

          const text = `*NOVA SOLICITAÇÃO DE EMPRÉSTIMO*%0A%0A` +
                       `👤 *Nome:* ${name}%0A` +
                       `🆔 *CPF:* ${cpf}%0A` +
                       `💰 *Valor Solicitado:* ${formatCurrency(amount)}%0A` +
                       `🗓 *Prazo:* ${months} meses%0A%0A` +
                       `💵 *Parceria Mensal:* ${formatCurrency(installment)}%0A` +
                       `📊 *Total a Pagar:* ${formatCurrency(totalPayment)}%0A` +
                       `📅 *1º Vencimento:* ${formatDateDisplay(firstPaymentDate)}%0A%0A` +
                       `_O cliente aguarda retorno via WhatsApp._`;
                       
          window.open(`https://wa.me/${yourWhatsAppNumber}?text=${text}`, '_blank');
        };

        const isFormValid = name.length >= 3 && cpf.length === 14 && amount > 0 && firstPaymentDate !== '';

        return (
          <div className="min-h-screen flex items-center justify-center p-2 sm:p-4 bg-slate-100">
            <div className="bg-white max-w-md w-full rounded-[2.5rem] shadow-2xl overflow-hidden border border-white">
              
              {/* Header */}
              <div className="bg-gradient-to-br from-blue-600 to-indigo-900 p-8 text-white text-center">
                <div className="flex justify-center mb-4">
                  <div className="bg-white/10 p-5 rounded-3xl backdrop-blur-md border border-white/10">
                    <i data-lucide="calculator" className="w-10 h-10 text-white"></i>
                  </div>
                </div>
                <h1 className="text-3xl font-black tracking-tight leading-none mb-2">Simulador</h1>
                <p className="text-blue-100 text-base opacity-90 font-medium">Crédito Rápido e Fácil</p>
              </div>

              <div className="p-6 sm:p-8 space-y-6">
                
                {/* Campo Nome */}
                <div className="space-y-2">
                  <label className="flex items-center text-xs font-black text-slate-400 uppercase tracking-widest ml-1">
                    <i data-lucide="user" className="mr-2 text-blue-600 w-4 h-4"></i>
                    Nome Completo
                  </label>
                  <input
                    type="text"
                    placeholder="Seu nome completo"
                    value={name}
                    onChange={(e) => setName(e.target.value)}
                    className="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-lg font-bold text-slate-700 placeholder:text-slate-300"
                  />
                </div>

                {/* Campo CPF */}
                <div className="space-y-2">
                  <label className="flex items-center text-xs font-black text-slate-400 uppercase tracking-widest ml-1">
                    <i data-lucide="user-check" className="mr-2 text-blue-600 w-4 h-4"></i>
                    CPF
                  </label>
                  <input
                    type="text"
                    placeholder="000.000.000-00"
                    value={cpf}
                    onChange={handleCpfChange}
                    className="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-xl font-mono font-bold text-slate-700 placeholder:text-slate-300"
                  />
                </div>

                {/* Campo Valor */}
                <div className="space-y-2">
                  <label className="flex items-center text-xs font-black text-slate-400 uppercase tracking-widest ml-1">
                    <i data-lucide="dollar-sign" className="mr-2 text-blue-600 w-4 h-4"></i>
                    Valor do Empréstimo
                  </label>
                  <div className="relative">
                    <span className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400 font-black text-xl">R$</span>
                    <input
                      type="number"
                      value={amount}
                      onChange={(e) => setAmount(Number(e.target.value))}
                      className="w-full pl-16 pr-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-2xl font-black text-slate-800"
                    />
                  </div>
                </div>

                {/* Campo Prazo */}
                <div className="space-y-4">
                  <div className="flex justify-between items-end ml-1">
                    <label className="flex items-center text-xs font-black text-slate-400 uppercase tracking-widest">
                      <i data-lucide="calendar" className="mr-2 text-blue-600 w-4 h-4"></i>
                      Parcelas
                    </label>
                    <span className="text-blue-700 font-black bg-blue-100 px-4 py-1.5 rounded-xl text-sm">
                      {months}x
                    </span>
                  </div>
                  <input
                    type="range"
                    min="1"
                    max="24"
                    value={months}
                    onChange={(e) => setMonths(Number(e.target.value))}
                    className="w-full h-3 bg-slate-200 rounded-full appearance-none cursor-pointer accent-blue-600"
                  />
                  <div className="flex justify-between text-[10px] font-bold text-slate-400 px-1 uppercase tracking-tighter">
                    <span>1 mês</span>
                    <span>12 meses</span>
                    <span>24 meses</span>
                  </div>
                </div>

                {/* Resultado */}
                <div className="bg-slate-900 rounded-[2rem] p-7 text-white shadow-2xl shadow-blue-900/20 mt-6 relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-4 opacity-10">
                    <i data-lucide="calculator" className="w-20 h-20"></i>
                  </div>
                  <h3 className="text-blue-400 text-[11px] font-black uppercase tracking-[3px] mb-2 relative z-10">Mensalidade Estimada</h3>
                  <div className="text-5xl font-black mb-6 relative z-10 tracking-tight">
                    {formatCurrency(installment)}
                  </div>
                  
                  <div className="space-y-3 pt-5 border-t border-white/10 text-sm relative z-10 font-medium">
                    <div className="flex justify-between text-slate-400">
                      <span>Juros Mensais:</span>
                      <span className="text-white font-bold">10%</span>
                    </div>
                    <div className="flex justify-between text-slate-400">
                      <span>Montante Total:</span>
                      <span className="text-white font-bold">{formatCurrency(totalPayment)}</span>
                    </div>
                  </div>
                </div>

                {/* Botão de Envio com ícone do WhatsApp */}
                <button
                  onClick={handleSendWhatsApp}
                  disabled={!isFormValid}
                  className={`w-full flex items-center justify-center space-x-4 py-5 rounded-2xl font-black text-lg transition-all active:scale-95 shadow-xl ${
                    isFormValid 
                    ? 'bg-green-500 hover:bg-green-600 text-white shadow-green-500/30' 
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'
                  }`}
                >
                  <span className="uppercase tracking-widest">Enviar Proposta</span>
                  <WhatsAppIcon className="w-6 h-6" />
                </button>
                
                <p className="text-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                  Sujeito a análise de crédito
                </p>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
